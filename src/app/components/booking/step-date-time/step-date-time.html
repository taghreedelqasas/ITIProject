<!-- Date picker -->
<h2 class="text-xl font-extrabold text-[#1a1033] mb-4">اختر التاريخ</h2>

<div class="bg-[#ece7f0] border border-[#c5b5d2] border-solid rounded-[16px] p-6 mb-10">

  <!-- Month nav -->
  <div class="flex items-center justify-between mb-6">
    <button (click)="state.prevMonth()" class="text-[#1c1c1c] hover:text-cyan-500 transition-colors cursor-pointer">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
      </svg>
    </button>
    <span class="font-bold text-[#1c1c1c] text-[16px] font-['Tajawal']">{{ state.monthLabel() }}</span>
    <button (click)="state.nextMonth()" class="text-[#1c1c1c] hover:text-cyan-500 transition-colors cursor-pointer">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
      </svg>
    </button>
  </div>

  <!-- Week day labels -->
  <div class="grid grid-cols-7 text-center text-[12px] text-[#82609d] font-bold mb-3 font-['Tajawal']">
    @for (day of state.weekDays; track day) {
      <span>{{ day }}</span>
    }
  </div>

  <!-- Day cells -->
  <div class="grid grid-cols-7 gap-y-4 text-center">
    @for (day of state.calendarDays(); track $index) {
      <div class="flex justify-center">
        @if (day) {
          <button
            (click)="state.selectDate(day)"
            class="w-[40px] h-[40px] rounded-[10px] flex items-center justify-center text-[16px] transition-colors cursor-pointer font-['Tajawal']"
            [ngClass]="day.date === state.selectedDate()
              ? 'bg-[rgba(197,181,210,0.62)] text-[#25093c] font-bold border border-[#23e0e0] border-solid'
              : 'text-[#25093c] hover:bg-[#ece7f0]/80'"
          >
            {{ day.date }}
          </button>
        }
      </div>
    }
  </div>
</div>

<!-- Time picker -->
<h2 class="text-xl font-extrabold text-[#1a1033] mb-4">إختر الوقت</h2>

<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-10">
  @for (row of state.timeSlots(); track $index) {
    @for (slot of row; track slot.id) {
      <button
        (click)="state.selectTime(slot)"
        class="h-[44px] rounded-[10px] text-[14px] font-bold transition-all border font-['Tajawal'] cursor-pointer"
        [ngClass]="slot.label === state.selectedTime()
          ? 'bg-[rgba(197,181,210,0.62)] text-[#4b5563] border-[#23e0e0] border-solid'
          : 'bg-[#ece7f0] text-[#4b5563] border-[#f3f4f6] border-solid hover:bg-[#ece7f0]/80'"
      >
        {{ slot.label }}
      </button>
    }
  }
</div>

<!-- Next button -->
<button
  (click)="onNext()"
  class="w-full bg-[#23e0e0] hover:bg-[#23e0e0]/80 transition-colors text-[#1a1033] font-extrabold text-[18px] h-[48px] rounded-[40px] flex items-center justify-center cursor-pointer shadow-sm"
>
  التالي
</button>
