<!-- Date picker -->
<h2 class="text-xl font-extrabold text-[#3a1560] mb-4">اختر التاريخ</h2>

<div class="bg-purple-50 rounded-2xl p-6 mb-10">

  <!-- Month nav -->
  <div class="flex items-center justify-between mb-6">
    <button (click)="state.prevMonth()" class="text-[#3a1560] hover:text-cyan-500 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
      </svg>
    </button>
    <span class="font-bold text-[#3a1560]">{{ state.monthLabel() }}</span>
    <button (click)="state.nextMonth()" class="text-[#3a1560] hover:text-cyan-500 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
      </svg>
    </button>
  </div>

  <!-- Week day labels -->
  <div class="grid grid-cols-7 text-center text-sm text-slate-500 font-bold mb-3">
    @for (day of state.weekDays; track day) {
      <span>{{ day }}</span>
    }
  </div>

  <!-- Day cells -->
  <div class="grid grid-cols-7 gap-y-4 text-center">
    @for (day of state.calendarDays(); track $index) {
      <div class="flex justify-center">
        @if (day) {
          <button
            (click)="state.selectDate(day)"
            class="w-10 h-10 rounded-xl flex items-center justify-center text-sm transition-colors"
            [class]="day.date === state.selectedDate()
              ? 'bg-purple-200 text-[#3a1560] font-bold border-2 border-cyan-400'
              : 'text-slate-600 hover:bg-purple-100'"
          >
            {{ day.date }}
          </button>
        }
      </div>
    }
  </div>
</div>

<!-- Time picker -->
<h2 class="text-xl font-extrabold text-[#3a1560] mb-4">إختر الوقت</h2>

<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-10">
  @for (row of state.timeSlots(); track $index) {
    @for (slot of row; track slot.id) {
      <button
        (click)="state.selectTime(slot)"
        class="rounded-xl py-3 text-sm font-bold transition-colors border"
        [class]="slot.label === state.selectedTime()
          ? 'bg-purple-100 text-[#3a1560] border-2 border-cyan-400'
          : 'bg-purple-50 text-slate-600 border-transparent hover:bg-purple-100'"
      >
        {{ slot.label }}
      </button>
    }
  }
</div>

<!-- Next button -->
<button
  (click)="onNext()"
  class="w-full bg-cyan-400 hover:bg-cyan-500 transition-colors text-[#3a1560] font-extrabold text-lg py-4 rounded-full shadow-md"
>
  التالي
</button>
