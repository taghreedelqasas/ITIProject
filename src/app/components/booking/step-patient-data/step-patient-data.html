<h2 class="text-xl font-extrabold text-[#3a1560] mb-6">بيانات المريض</h2>

<form class="mb-8" (ngSubmit)="onSubmit()">

  <!-- الأسم بالكامل -->
  <div class="mb-6">
    <label class="block text-sm font-bold text-slate-700 mb-2">
      الأسم بالكامل<span class="text-red-500">*</span>
    </label>
    <input
      type="text"
      name="fullName"
      [ngModel]="state.patient().fullName"
      (ngModelChange)="state.updatePatientField('fullName', $event)"
      placeholder="أدخل اسمك بالكامل"
      class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:border-transparent"
    />
  </div>

  <!-- رقم الهاتف -->
  <div class="mb-6">
    <label class="block text-sm font-bold text-slate-700 mb-2">
      رقم الهاتف<span class="text-red-500">*</span>
    </label>
    <div class="flex items-center rounded-xl border border-slate-200 focus-within:ring-2 focus-within:ring-cyan-400 relative">
      <!-- Country selector -->
      <button
        type="button"
        (click)="state.toggleCountryMenu()"
        class="flex items-center gap-1 px-4 py-3 border-l border-slate-200 shrink-0"
      >
        <span class="text-lg leading-none">{{ state.selectedCountry().flag }}</span>
        <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
      </button>

      <!-- Country dropdown -->
      @if (state.isCountryMenuOpen()) {
        <ul class="absolute top-full right-0 mt-1 w-40 bg-white rounded-xl shadow-lg border border-slate-100 py-1 z-10">
          @for (country of countries; track country.code) {
            <li>
              <button
                type="button"
                (click)="state.selectCountry(country)"
                class="w-full flex items-center gap-2 px-4 py-2 text-sm text-slate-700 hover:bg-purple-50"
              >
                <span class="text-lg leading-none">{{ country.flag }}</span>
                <span>{{ country.name }}</span>
                <span class="text-slate-400 mr-auto">{{ country.code }}</span>
              </button>
            </li>
          }
        </ul>
      }

      <span class="px-2 text-sm text-slate-500 shrink-0">{{ state.selectedCountry().code }}</span>

      <input
        type="tel"
        name="phone"
        [ngModel]="state.patient().phone"
        (ngModelChange)="state.updatePatientField('phone', $event)"
        placeholder="1XX XXX XXXX"
        class="w-full px-2 py-3 text-sm text-slate-700 placeholder-slate-400 focus:outline-none rounded-l-xl"
      />
    </div>
  </div>

  <!-- العمر والجنس -->
  <div class="grid grid-cols-2 gap-4 mb-6">
    <div>
      <label class="block text-sm font-bold text-slate-700 mb-2">الجنس</label>
      <select
        name="gender"
        [ngModel]="state.patient().gender"
        (ngModelChange)="state.updatePatientField('gender', $event)"
        class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:border-transparent"
        [class]="state.patient().gender ? 'text-slate-700' : 'text-slate-400'"
      >
        <option value="" disabled selected>ذكر / أنثى</option>
        <option value="male">ذكر</option>
        <option value="female">أنثى</option>
      </select>
    </div>
    <div>
      <label class="block text-sm font-bold text-slate-700 mb-2">العمر</label>
      <input
        type="number"
        name="age"
        [ngModel]="state.patient().age"
        (ngModelChange)="state.updatePatientField('age', $event)"
        placeholder="مثال : 30"
        min="0"
        class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:border-transparent"
      />
    </div>
  </div>

  <!-- ملاحظات للطبيب -->
  <div class="mb-8">
    <label class="block text-sm font-bold text-slate-700 mb-2">ملاحظات للطبيب</label>
    <div class="relative">
      <textarea
        name="notes"
        [ngModel]="state.patient().notes"
        (ngModelChange)="state.updatePatientField('notes', $event)"
        rows="4"
        placeholder="اذكر أعراضك أو أي أمراض مزمنة مثل(السكر, الضغط, ........)."
        class="w-full rounded-xl border border-slate-200 px-4 py-3 pl-10 text-sm text-slate-700 placeholder-slate-400 resize-none focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:border-transparent"
      ></textarea>
      <svg class="w-5 h-5 text-slate-300 absolute top-3 left-3" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6M9 8h1M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2h-4l-2-2H9a2 2 0 00-2 2v14a2 2 0 002 2z" />
      </svg>
    </div>
  </div>

  <!-- Action buttons -->
  <div class="flex flex-row-reverse gap-4">
    <button
      type="submit"
      [disabled]="!state.isPatientFormValid()"
      class="flex-1 font-extrabold text-lg py-4 rounded-full shadow-md transition-colors"
      [class]="state.isPatientFormValid()
        ? 'bg-cyan-400 hover:bg-cyan-500 text-[#3a1560] cursor-pointer'
        : 'bg-cyan-100 text-white cursor-not-allowed'"
    >
      التالي
    </button>
    <button
      type="button"
      (click)="onBack()"
      class="flex-1 font-extrabold text-lg py-4 rounded-full border-2 border-purple-800 text-purple-800 hover:bg-purple-50 transition-colors"
    >
      رجوع
    </button>
  </div>
</form>
