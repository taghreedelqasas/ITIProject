<div dir="rtl" class="min-h-screen bg-slate-50 font-[Tajawal] py-10">

  <!-- ===================== Hero + Search ===================== -->
  <section class="bg-gradient-to-br from-[#f3ecfa] via-[#f6f2fb] to-[#e8fbfb] pt-14 pb-16 px-6">

    <div class="max-w-4xl mx-auto text-center mb-10">
      <h1 class="text-4xl md:text-5xl font-extrabold text-[#3a1560] mb-3">{{ pageTitle }}</h1>
      <p class="text-slate-500 text-lg">{{ pageSubtitle }}</p>
    </div>

    <div class="max-w-5xl mx-auto bg-white rounded-3xl shadow-md p-6 md:p-10">

      <h2 class="flex items-center justify-center gap-2 text-xl font-extrabold text-[#3a1560] mb-8">
        ابحث عن طبيبك
        <svg class="w-5 h-5 text-[#3a1560]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11a6 6 0 11-12 0 6 6 0 0112 0z" />
        </svg>
      </h2>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-6">

        <!-- التخصص -->
        <div>
          <label class="block text-sm font-bold text-slate-600 mb-2">التخصص</label>
          <select
            [(ngModel)]="selectedSpecialty"
            class="w-full border border-slate-200 rounded-xl px-4 py-3 text-slate-500 bg-white focus:outline-none focus:border-cyan-400 appearance-none"
          >
            <option value="">أختر التخصص</option>
            <option *ngFor="let s of specialties" [value]="s">{{ s }}</option>
          </select>
        </div>

        <!-- الموقع -->
        <div>
          <label class="block text-sm font-bold text-slate-600 mb-2">الموقع</label>
          <input
            type="text"
            [(ngModel)]="selectedLocation"
            placeholder="أدخل المحافظة"
            class="w-full border border-slate-200 rounded-xl px-4 py-3 text-slate-500 placeholder:text-slate-400 focus:outline-none focus:border-cyan-400"
          />
        </div>

        <!-- التاريخ -->
        <div>
          <label class="block text-sm font-bold text-slate-600 mb-2">التاريخ</label>
          <div class="relative">
            <svg class="absolute right-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 pointer-events-none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            <input
              type="text"
              [(ngModel)]="selectedDate"
              placeholder="يوم / شهر / سنة"
              class="w-full border border-slate-200 rounded-xl pr-11 pl-4 py-3 text-slate-500 placeholder:text-slate-400 focus:outline-none focus:border-cyan-400"
            />
          </div>
        </div>
      </div>

      <!-- إسم الطبيب أو العيادة -->
      <div class="mb-6">
        <label class="block text-sm font-bold text-slate-600 mb-2">إسم الطبيب أو العيادة</label>
        <div class="flex gap-3">
          <input
            type="text"
            [(ngModel)]="searchQuery"
            placeholder="ابحث بإسم الطبيب أو إسم العيادة"
            class="flex-1 border border-slate-200 rounded-xl px-4 py-3 text-slate-500 placeholder:text-slate-400 focus:outline-none focus:border-cyan-400"
          />
          <button
            (click)="onSearch()"
            class="bg-cyan-400 hover:bg-cyan-500 transition-colors text-white font-bold px-8 rounded-xl whitespace-nowrap"
          >
            ابحث الآن
          </button>
        </div>
      </div>

      <!-- Divider -->
      <div class="relative flex items-center justify-center mt-2">
        <div class="w-full h-px bg-slate-200"></div>
        <span class="absolute bg-white px-4 text-slate-400 text-sm">أو</span>
      </div>
    </div>
  </section>

  <!-- ===================== Sort bar ===================== -->
  <div class="max-w-6xl mx-auto px-6 mt-8 mb-6 flex flex-wrap items-center justify-between gap-4">
    <div class="flex flex-wrap gap-3">
      <button
        *ngFor="let opt of sortOptions"
        (click)="selectSort(opt.value)"
        [ngClass]="opt.value === selectedSort
          ? 'bg-[#3a1560] text-white'
          : 'bg-white text-slate-500 border border-slate-200 hover:border-slate-300'"
        class="px-5 py-2 rounded-full text-sm font-bold transition-colors"
      >
        {{ opt.label }}
      </button>
    </div>

    <div class="flex items-center gap-2 text-slate-500 font-bold text-sm whitespace-nowrap">
      <svg class="w-5 h-5 text-[#3a1560]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 4h13M3 8h9M3 12h9m5-4v12m0 0l-3-3m3 3l3-3" />
      </svg>
      ترتيب:
    </div>
  </div>

  <!-- ===================== Results ===================== -->
  <div class="max-w-6xl mx-auto px-6">

    <h2 class="text-2xl font-extrabold text-[#3a1560] mb-6">
      كل التخصصات
      <span class="text-slate-400 text-base font-normal">({{ totalDoctorsLabel }})</span>
    </h2>

    <div *ngIf="isLoading" class="text-center text-slate-400 py-10">جاري تحميل الأطباء...</div>
    <div *ngIf="errorMessage && !isLoading" class="text-center text-red-500 font-semibold py-10">{{ errorMessage }}</div>
    <div *ngIf="!isLoading && !errorMessage && doctors.length === 0" class="text-center text-slate-400 py-10">لا يوجد أطباء مطابقين لبحثك حاليًا.</div>

    <div *ngIf="!isLoading && doctors.length > 0" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
      <div
        *ngFor="let doctor of doctors"
        (click)="viewDoctorProfile(doctor)"
        class="bg-white rounded-2xl shadow-sm overflow-hidden hover:shadow-md transition-shadow cursor-pointer"
      >
        <!-- Photo -->
        <div class="relative h-48">
          <img [src]="doctor.image" [alt]="doctor.name" class="w-full h-full object-cover" />

          <span class="absolute top-3 left-3 bg-white/95 backdrop-blur rounded-full px-2.5 py-1 flex items-center gap-1 shadow-sm">
            <svg class="w-3.5 h-3.5 text-amber-400" fill="currentColor" viewBox="0 0 20 20">
              <path d="M10 1.5l2.6 5.27 5.82.85-4.21 4.1 1 5.8L10 14.9l-5.21 2.62 1-5.8-4.21-4.1 5.82-.85z" />
            </svg>
            <span class="text-xs font-bold text-[#3a1560]">{{ doctor.rating }}</span>
          </span>

          <button
            (click)="toggleFavorite(doctor); $event.stopPropagation()"
            class="absolute top-3 right-3 w-8 h-8 rounded-full bg-white/95 backdrop-blur flex items-center justify-center shadow-sm"
          >
            <svg
              class="w-4 h-4"
              [ngClass]="doctor.isFavorite ? 'text-red-500' : 'text-slate-300'"
              [attr.fill]="doctor.isFavorite ? 'currentColor' : 'none'"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
            </svg>
          </button>
        </div>

        <!-- Info -->
        <div class="p-4">
          <h3 class="font-bold text-[#3a1560] text-base mb-1">{{ doctor.name }}</h3>
          <p class="text-slate-500 text-xs leading-relaxed">{{ doctor.specialty }}</p>
          <p class="text-slate-400 text-xs mb-2">{{ doctor.detail }}</p>

          <div class="flex items-center gap-0.5 mb-4">
            <svg *ngFor="let s of starsArray" class="w-3.5 h-3.5 text-amber-400" fill="currentColor" viewBox="0 0 20 20">
              <path d="M10 1.5l2.6 5.27 5.82.85-4.21 4.1 1 5.8L10 14.9l-5.21 2.62 1-5.8-4.21-4.1 5.82-.85z" />
            </svg>
          </div>

          <div class="flex gap-2">
            <button
              (click)="onChatWithDoctor(doctor); $event.stopPropagation()"
              class="flex-1 border border-purple-800 text-[#3a1560] text-sm font-bold rounded-full py-2 hover:bg-purple-50 transition-colors"
            >
              شات الطبيب
            </button>
            <button
              (click)="onBookAppointment(doctor); $event.stopPropagation()"
              class="flex-1 bg-cyan-400 hover:bg-cyan-500 text-white text-sm font-bold rounded-full py-2 transition-colors"
            >
              احجز موعد
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ===================== Pagination ===================== -->
    <div class="flex items-center justify-center gap-2 mb-6">
      <button
        (click)="goToPage(currentPage - 1)"
        class="w-9 h-9 rounded-full border border-cyan-400 text-cyan-500 flex items-center justify-center hover:bg-cyan-50 transition-colors"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
      </button>

      <button
        *ngFor="let page of pages"
        (click)="goToPage(page)"
        [disabled]="page === '...'"
        [ngClass]="page === currentPage
          ? 'border-purple-800 text-[#3a1560] font-bold'
          : 'border-transparent text-slate-500 hover:bg-slate-100'"
        class="w-9 h-9 rounded-full border text-sm flex items-center justify-center transition-colors"
      >
        {{ page }}
      </button>

      <button
        (click)="goToPage(currentPage + 1)"
        class="w-9 h-9 rounded-full border border-cyan-400 text-cyan-500 flex items-center justify-center hover:bg-cyan-50 transition-colors"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
        </svg>
      </button>
    </div>
  </div>
</div>
