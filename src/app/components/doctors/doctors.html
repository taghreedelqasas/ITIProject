<div dir="rtl" class="min-h-screen bg-slate-50 font-[Tajawal] py-10">
  <!-- ===================== Hero + Search ===================== -->
  <section class="bg-gradient-to-br from-[#f3ecfa] via-[#f6f2fb] to-[#e8fbfb] pt-14 pb-16 px-6">
    <div class="max-w-4xl mx-auto text-center mb-10">
      <h1 class="text-4xl md:text-5xl font-extrabold text-[#3a1560] mb-3">{{ pageTitle }}</h1>
      <p class="text-slate-500 text-lg">{{ pageSubtitle }}</p>
    </div>

    <div class="max-w-5xl mx-auto bg-white rounded-3xl shadow-md p-6 md:p-10">
      <h2 class="flex items-center justify-center gap-2 text-xl font-extrabold text-[#3a1560] mb-8">
        ابحث عن طبيبك
        
      </h2>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
        <!-- التخصص -->
        <div>
          <label class="block text-sm font-bold text-slate-600 mb-2">التخصص</label>
   <select
  [(ngModel)]="selectedSpecialty"
  (change)="onSearch()"
  class="w-full border border-slate-200 rounded-xl px-4 py-3 text-slate-500 bg-white focus:outline-none focus:border-cyan-400 appearance-none cursor-pointer"
>
  <option value="">أختر التخصص</option>
  <!-- تعديل الفوب للرجوع للأصل العربي المباشر -->
  <option *ngFor="let s of specialties" [value]="s">{{ s }}</option>
</select>
        </div>

        <!-- الموقع -->
        <div>
          <label class="block text-sm font-bold text-slate-600 mb-2">الموقع</label>
          <input
            type="text"
            [(ngModel)]="selectedLocation"
            (keyup.enter)="onSearch()"
            (blur)="onSearch()"
            placeholder="أدخل المحافظة  "
            class="w-full border border-slate-200 rounded-xl px-4 py-3 text-slate-500 placeholder:text-slate-400 focus:outline-none focus:border-cyan-400"
          />
        </div>

     
      </div>

      <!-- إسم الطبيب أو العيادة -->
      <div class="mb-6">
        <label class="block text-sm font-bold text-slate-600 mb-2">إسم الطبيب  </label>
        <div class="flex gap-3">
          <input
            type="text"
            [(ngModel)]="searchQuery"
            (keyup.enter)="onSearch()"
            placeholder="ابحث بإسم الطبيب"
            class="flex-1 border border-slate-200 rounded-xl px-4 py-3 text-slate-500 placeholder:text-slate-400 focus:outline-none focus:border-cyan-400"
          />
          <button
            (click)="onSearch()"
            class="bg-cyan-400 hover:bg-cyan-500 transition-colors text-white font-bold px-8 rounded-xl whitespace-nowrap"
          >
            ابحث الآن
          </button>
        </div>
      </div>

      <!-- Divider -->
      <div class="relative flex items-center justify-center mt-2">
      </div>
    </div>
  </section>

  <!-- ===================== Sort bar ===================== -->
  <section class="bg-[#fcfcfc] border-[#f0ebfa] border-b border-solid py-[13px] px-6 md:px-[100px] shadow-[0px_1px_3px_0px_rgba(0,0,0,0.1),0px_1px_2px_-1px_rgba(0,0,0,0.1)] mb-8" dir="rtl">
    <div class="max-w-6xl mx-auto flex items-center justify-start gap-4">
      <div class="flex items-center gap-2 text-[#82609d] opacity-80 whitespace-nowrap">
        <svg class="w-6 h-6 text-[#6CEAEA]" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
        </svg>
        <span class="text-[24px] font-['Tajawal']">ترتيب:</span>
      </div>

      <div class="flex flex-wrap gap-4">
        <button
          *ngFor="let opt of sortOptions"
          (click)="selectSort(opt.value)"
          [ngClass]="opt.value === selectedSort
            ? 'text-[#fcfcfc]'
            : 'bg-[#ece7f0] text-[#69418a] hover:bg-[#ece7f0]/80'"
          [style.background-image]="opt.value === selectedSort ? 'linear-gradient(126.444deg, rgb(105, 65, 138) 0%, rgb(130, 96, 157) 100%)' : null"
          class="h-[44px] px-[16px] py-[6px] rounded-[16px] text-[16px] font-['Tajawal'] transition-all font-medium cursor-pointer"
        >
          {{ opt.label }}
        </button>
      </div>
    </div>
  </section>

  <!-- ===================== Results ===================== -->
  <div class="max-w-6xl mx-auto px-6">
    <h2 class="text-2xl font-extrabold text-[#3a1560] mb-6">
      كل التخصصات
      <span class="text-slate-400 text-base font-normal">({{ totalDoctorsLabel }})</span>
    </h2>

<!-- ===================== 🔄 Loading Spinner ===================== -->
<div *ngIf="isLoading" class="flex flex-col items-center justify-center py-20 gap-4">
  <!-- الـ Spinner المتحرك -->
  <div class="relative w-16 h-16">
    <div class="w-16 h-16 rounded-full border-4 border-slate-200 border-t-[#3a1560] animate-spin"></div>
    <div class="absolute inset-2 w-12 h-12 rounded-full border-4 border-transparent border-b-[#23e0e0] animate-spin-reverse"></div>
  </div>
  <!-- نص التحميل -->
  <p class="text-slate-500 font-bold text-lg animate-pulse">جاري تحميل الأطباء...</p>
</div>    <div *ngIf="errorMessage && !isLoading" class="text-center text-red-500 font-semibold py-10">
      {{ errorMessage }}
    </div>
    <div  
      *ngIf="!isLoading && !errorMessage && doctors.length === 0"
      class="text-center text-slate-400 py-10"
    >
      لا يوجد أطباء مطابقين لبحثك حاليًا.
    </div>

    <div
      *ngIf="!isLoading && doctors.length > 0"
      class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-12"
    >
      <div
        *ngFor="let doctor of doctors"
        (click)="viewDoctorProfile(doctor)"
        class="backdrop-blur-[11.4px] bg-[#f3f4f5]/90 border-[1.1px] border-solid border-white rounded-[18.3px] shadow-[0px_-2.3px_4.6px_0px_rgba(0,0,0,0.05),0px_2.3px_4.6px_0px_rgba(0,0,0,0.05)] w-full overflow-hidden text-right p-3 cursor-pointer transition-shadow hover:shadow-md"
        dir="rtl"
      >
        <!-- Photo -->
        <div class="relative w-full h-[213px] rounded-[10.5px] overflow-hidden mb-3">
          <img [src]="doctor.image" [alt]="doctor.name" class="w-full h-full object-cover rounded-[10.5px]" />

          <!-- Rating badge inside photo (From main) -->
          <div class="absolute top-[8px] left-[8px] bg-[#e9fcfc] flex items-center gap-1 py-1 px-2.5 rounded-[16px] shadow-sm">
            <span class="text-[#53098d] font-bold text-[12px] font-['Tajawal']">({{ doctor.rating || '4.8' }})</span>
            <svg class="w-3.5 h-3.5 text-[#E8B006]" fill="currentColor" viewBox="0 0 20 20">
              <path d="M10 1.5l2.6 5.27 5.82.85-4.21 4.1 1 5.8L10 14.9l-5.21 2.62 1-5.8-4.21-4.1 5.82-.85z" />
            </svg>
          </div>

        
        </div>

        <!-- Info & Actions block -->
        <div class="px-2 pb-2">
          <div class="flex flex-col gap-1 items-start text-right w-full mb-3">
            <h3 class="text-[#1c1c1c] text-[19.2px] font-bold font-['Tajawal']">{{ doctor.name }}</h3>
            <p class="text-[#373d3f] text-[10px] font-['Tajawal']">{{ doctor.specialty }}</p>
            <p class="text-[#1c1c1c] text-[12px] font-['Tajawal'] mt-1">{{ doctor.detail }}</p>
            
          
          </div>

          <!-- Action buttons -->
          <div class="flex gap-3 items-center justify-center w-full mt-4">
            <!-- Button: Book Appointment -->
            <button
              (click)="onBookAppointment(doctor); $event.stopPropagation()"
              class="flex-1 bg-[#23e0e0] rounded-[40px] text-[#44116d] text-[16px] font-extrabold h-[44px] flex items-center justify-center hover:bg-[#23e0e0]/80 transition-colors"
            >
              احجز موعد
            </button>
       
          </div>
        </div>
      </div>
    </div>

    <!-- ===================== Pagination ===================== -->
    <div class="flex items-center justify-center gap-2 mb-6">
      <button
        (click)="goToPage(currentPage - 1)"
        class="w-9 h-9 rounded-full border border-cyan-400 text-cyan-500 flex items-center justify-center hover:bg-cyan-50 transition-colors"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
<path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />        </svg>
      </button>

      <button
        *ngFor="let page of pages"
        (click)="goToPage(page)"
        [disabled]="page === '...'"
        [ngClass]="
          page === currentPage
            ? 'border-purple-800 text-[#3a1560] font-bold'
            : 'border-transparent text-slate-500 hover:bg-slate-100'
        "
        class="w-9 h-9 rounded-full border text-sm flex items-center justify-center transition-colors"
      >
        {{ page }}
      </button>

      <button
        (click)="goToPage(currentPage + 1)"
        class="w-9 h-9 rounded-full border border-cyan-400 text-cyan-500 flex items-center justify-center hover:bg-cyan-50 transition-colors"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
<path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />        </svg>
      </button>
    </div>
  </div>
</div>
