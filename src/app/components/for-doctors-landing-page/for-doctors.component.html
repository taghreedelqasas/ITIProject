<div class="container     py-16 px-6 md:px-12  bg-gradient-to-br from-[#f3ecfa] via-[#f6f2fb] to-[#e8fbfb]">
<section
  dir="rtl"
  class="relative overflow-hidden   w-[90%]  mx-[auto]   font-[Tajawal] "
>
  <div class="max-w-7xl mx-auto">

    <div class="flex justify-center mb-6">
      <span
        class="inline-block rounded-full px-6 py-2 text-sm font-bold text-[#3a1560] bg-gradient-to-l from-[#c9b6ea] to-[#bdeef0] shadow-sm"
      >
        {{ badgeLabel }}
      </span>
    </div>

    <h1 class="text-center text-3xl md:text-5xl font-extrabold text-[#3a1560] mb-4 leading-tight">
      {{ title }}
    </h1>

    <p class="text-center text-slate-500 text-lg md:text-xl mb-12">
      {{ subtitle }}
    </p>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 items-center">

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 order-2 lg:order-2">
        <div
          *ngFor="let feature of features"
          class="bg-white rounded-2xl shadow-sm p-6 flex flex-col gap-4 hover:shadow-md transition-shadow"
        >
          <div class="w-10 h-10 rounded-lg bg-cyan-50 flex items-center justify-center">
            <svg
              class="w-5 h-5 text-cyan-500"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
              />
            </svg>
          </div>

          <div>
            <h3 class="font-bold text-[#3a1560] text-lg mb-1">{{ feature.title }}</h3>
            <p class="text-slate-500 text-sm leading-relaxed">{{ feature.description }}</p>
          </div>
        </div>
      </div>

      <div class="relative flex justify-center items-end order-1 lg:order-1 h-[420px] lg:h-[520px]">
       
<svg width="350" height="420"   class="absolute  "  viewBox="0 0 420 467" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M66.1729 129.387C-63.0271 239.787 26.3395 380.387 87.1729 436.887C177.173 522.087 290.006 401.387 335.173 330.387C397.173 254.787 417.006 142.221 419.173 95.3873C423.573 -1.81269 335.173 -6.61245 283.173 3.88753C218.173 9.38745 107.173 87.0539 66.1729 129.387Z" fill="#69418A"/>
</svg>


        <img
          src="/doctors/ffbb441ef5f046a3d3d516a6b9e4bdfec8f653a4.png"
          alt="طبيب يبتسم بمعطف أبيض وسماعة طبية"
          class="relative z-10 h-full object-contain object-bottom"
        />
      </div>
    </div>

    <div class="flex justify-center mt-14">
      <a
        routerLink="/auth/register"
        class="bg-cyan-400 hover:bg-cyan-500 transition-colors text-[#3a1560] font-bold text-lg px-10 py-4 rounded-full shadow-md"
      >
        {{ ctaLabel }}
    </a>
    </div>
  </div>
</section>

</div>
