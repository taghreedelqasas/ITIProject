<div class=" md:w-[80%]   mx-auto p-6 bg-white    shadow-lg  rounded-lg text-right rtl">
  <h2 class="text-center text-[#44116D] text-[29px] font-bold mb-6">ابحث عن طبيبك </h2>

   <section class="  pt-14 pb-16 px-6">

    <div class="max-w-4xl mx-auto text-center mb-10">

    <div class="max-w-5xl mx-auto bg-white ">

        <svg class="w-5 h-5 text-[#3a1560]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11a6 6 0 11-12 0 6 6 0 0112 0z" />
        </svg>
      </h2> -->

      <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-6">

        <!-- التخصص -->
        <div>
          <label class="block text-sm font-bold text-slate-600 mb-2">التخصص</label>
          <select
            [(ngModel)]="selectedSpecialty"
            class="w-full border border-slate-200 rounded-xl px-3 py-2 text-slate-500 bg-white focus:outline-none focus:border-cyan-400 appearance-none"
          >
            <option value="">أختر التخصص</option>
            <option *ngFor="let s of specialties" [value]="s">{{ s }}</option>
          </select>
        </div>

        <!-- الموقع -->
        <div>
          <label class="block text-sm font-bold text-slate-600 mb-2">الموقع</label>
          <input
            type="text"
            [(ngModel)]="selectedLocation"
            placeholder="أدخل المحافظة"
            class="w-full border border-slate-200 rounded-xl px-3 py-2 text-slate-500 placeholder:text-slate-400 focus:outline-none focus:border-cyan-400"
          />
        </div>


      </div>

      <!-- إسم الطبيب أو العيادة -->
      <div class="mb-6">
        <label class="block text-sm font-bold text-slate-600 mb-2">إسم الطبيب</label>
        <div class="flex gap-3">
          <input
            type="text"
            [(ngModel)]="searchQuery"
            placeholder="ابحث بإسم الطبيب"
            class="flex-1 border border-slate-200 rounded-xl px-3 py-2 text-slate-500 placeholder:text-slate-400 focus:outline-none focus:border-cyan-400"
          />
          <button
            (click)="onSearch()"
            class="bg-[#23E0E0] hover:bg-cyan-500 transition-colors text-[#53098D] font-bold px-5 rounded-xl whitespace-nowrap"
          >
            ابحث الآن
          </button>
        </div>
      </div>

      <!-- Divider -->
      <div class="relative flex items-center justify-center mt-2">
        <div class="w-full h-px bg-slate-200"></div>
        <span class="absolute bg-white px-4 text-slate-400 text-sm">أو</span>
      </div>
    </div>
  </section>

   <div class="aiContain  py-7 flex justify-between  rounded-lg bg-linear-to-l  from-[#E9FCFC] to-[#ECE7F0]  px-5">
