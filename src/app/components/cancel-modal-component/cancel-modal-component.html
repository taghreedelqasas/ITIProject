<div class="modal-overlay" dir="rtl" (click)="dismiss()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <div class="warning-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z" />
        <path d="M12 9v4" />
        <path d="M12 17h.01" />
      </svg>
    </div>

    <h3 class="modal-title">إلغاء الموعد</h3>

    <p class="modal-text">
      متأكدة إنك عايزة تلغي الموعد
      @if (appointment.doctorName) {
        مع <strong>{{ appointment.doctorName }}</strong>
      }
      @if (appointment.slotStart) {
        بتاريخ <strong>{{ appointment.slotStart | date: 'd MMM y - h:mm a' }}</strong>؟
      } @else {
        ؟
      }
      مش هتقدري ترجعي فيه بعد كده.
    </p>

    @if (errorMsg()) {
      <p class="modal-error">{{ errorMsg() }}</p>
    }

    <div class="modal-actions">
      <button
        type="button"
        class="btn btn--danger"
        [disabled]="submitting()"
        (click)="confirmCancel()"
      >
        {{ submitting() ? 'جارِ الإلغاء...' : 'تأكيد الإلغاء' }}
      </button>

      <button type="button" class="btn btn--ghost" [disabled]="submitting()" (click)="dismiss()">
        تراجع
      </button>
    </div>
  </div>
</div>
