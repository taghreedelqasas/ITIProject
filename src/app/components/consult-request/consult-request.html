<div dir="rtl" class="min-h-screen bg-slate-50 font-[Tajawal] pb-16">

  <!-- Header -->
  <header class="bg-gradient-to-l from-purple-900 via-purple-800 to-fuchsia-900 py-12 px-6 text-center">
    <h1 class="text-white text-3xl md:text-4xl font-extrabold mb-3">{{ pageTitle }}</h1>
    <p class="text-purple-200 text-lg">{{ pageSubtitle }}</p>
  </header>

  <div class="max-w-3xl mx-auto px-6">

    <!-- ===================== نموذج طلب الإستشارة ===================== -->
    <ng-container *ngIf="!submitted">

      <!-- Doctor card -->
      <div class="bg-white rounded-2xl shadow-sm p-6 flex items-center justify-between mt-10 mb-8 text-right" dir="rtl">
        <div class="flex items-center gap-4">
          <div>
            <h3 class="font-bold text-[#3a1560] text-lg">{{ doctor.name }}</h3>
            <p class="text-slate-500 text-sm mt-0.5">{{ doctor.specialty }}</p>

            <div class="flex items-center gap-1 text-sm text-slate-500 mt-1">
              <svg class="w-4 h-4 text-cyan-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a2 2 0 01-2.828 0l-4.243-4.243a8 8 0 1111.314 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
              <span>{{ doctor.location }}</span>

              <span class="mx-1 text-slate-300">|</span>

              <span>({{ doctor.reviewsCount }})</span>
              <svg class="w-4 h-4 text-amber-400" fill="currentColor" viewBox="0 0 20 20">
                <path d="M10 1.5l2.6 5.27 5.82.85-4.21 4.1 1 5.8L10 14.9l-5.21 2.62 1-5.8-4.21-4.1 5.82-.85z" />
              </svg>
              <span class="font-bold text-[#3a1560]">{{ doctor.rating }}</span>
            </div>
          </div>
        </div>

        <img [src]="doctorImage" [alt]="doctor.name" class="w-16 h-16 rounded-xl object-cover shrink-0" />
      </div>

      <!-- بيانات المريض -->
      <h2 class="font-extrabold text-[#3a1560] text-xl mb-5">بيانات المريض</h2>

      <form (ngSubmit)="onSubmit()" class="flex flex-col gap-6">

        <!-- الأسم بالكامل -->
        <div>
          <label class="text-sm text-slate-700 mb-1.5 block">
            الأسم بالكامل<span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            name="fullName"
            [(ngModel)]="patient.fullName"
            placeholder="أدخل اسمك بالكامل"
            class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-700 placeholder:text-slate-300 focus:outline-none focus:ring-2 focus:ring-cyan-300"
          />
        </div>

        <!-- رقم الهاتف -->
        <div>
          <label class="text-sm text-slate-700 mb-1.5 block">
            رقم الهاتف<span class="text-red-500">*</span>
          </label>
          <div class="flex items-center bg-white border border-slate-200 rounded-xl overflow-visible relative focus-within:ring-2 focus-within:ring-cyan-300">
            <button
              type="button"
              (click)="toggleCountryMenu()"
              class="flex items-center gap-1.5 px-4 py-3 border-l border-slate-200 shrink-0"
            >
              <span class="text-lg leading-none">{{ selectedCountry.flag }}</span>
              <svg class="w-3.5 h-3.5 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
              </svg>
            </button>

            <input
              type="tel"
              name="phone"
              [(ngModel)]="patient.phone"
              placeholder="أدخل رقم هاتفك"
              class="flex-1 px-4 py-3 text-sm text-slate-700 placeholder:text-slate-300 focus:outline-none rounded-xl"
            />

            <!-- قائمة الدول -->
            <div
              *ngIf="isCountryMenuOpen"
              class="absolute top-full right-0 mt-2 w-44 bg-white border border-slate-200 rounded-xl shadow-lg z-20 overflow-hidden"
            >
              <button
                *ngFor="let country of countries"
                type="button"
                (click)="selectCountry(country)"
                class="w-full flex items-center gap-2 px-4 py-2.5 text-sm text-slate-600 hover:bg-purple-50 transition-colors text-right"
              >
                <span class="text-lg leading-none">{{ country.flag }}</span>
                <span>{{ country.name }}</span>
                <span class="text-slate-400 mr-auto">{{ country.code }}</span>
              </button>
            </div>
          </div>
        </div>

        <!-- العمر / الجنس -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="text-sm text-slate-700 mb-1.5 block">العمر</label>
            <input
              type="number"
              name="age"
              [(ngModel)]="patient.age"
              placeholder="مثال : 30"
              class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-700 placeholder:text-slate-300 focus:outline-none focus:ring-2 focus:ring-cyan-300"
            />
          </div>
          <div>
            <label class="text-sm text-slate-700 mb-1.5 block">الجنس</label>
            <select
              name="gender"
              [(ngModel)]="patient.gender"
              class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-cyan-300"
              [ngClass]="patient.gender ? 'text-slate-700' : 'text-slate-300'"
            >
              <option value="" disabled selected hidden>ذكر / أنثى</option>
              <option value="male">ذكر</option>
              <option value="female">أنثى</option>
            </select>
          </div>
        </div>

        <!-- سبب الإستشارة -->
        <div>
          <label class="text-sm text-slate-700 mb-1.5 block">سبب الإستشارة</label>
          <div class="relative">
            <textarea
              name="reason"
              [(ngModel)]="patient.reason"
              rows="5"
              placeholder="اذكر أعراضك أو أي أمراض مزمنة مثل(السكر, الضغط, .........)."
              class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-700 placeholder:text-slate-300 focus:outline-none focus:ring-2 focus:ring-cyan-300 resize-none"
            ></textarea>
            <svg class="w-4 h-4 text-slate-300 absolute top-3 left-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
          </div>
        </div>

        <!-- أزرار -->
        <div *ngIf="errorMessage" class="text-rose-500 text-sm font-semibold text-center">{{ errorMessage }}</div>
        <div class="flex items-center gap-4 mt-4">
          <button
            type="submit"
            [disabled]="!isFormValid || isLoading"
            [ngClass]="isFormValid && !isLoading
              ? 'bg-cyan-400 hover:bg-cyan-500'
              : 'bg-cyan-200 cursor-not-allowed'"
            class="flex-1 text-white font-extrabold text-base py-3.5 rounded-full shadow-md transition-colors"
          >
            {{ isLoading ? 'جاري الإرسال...' : 'إرسال الطلب' }}
          </button>
          <button
            type="button"
            (click)="onBack()"
            class="flex-1 font-extrabold text-base py-3.5 rounded-full border-2 border-purple-800 text-purple-800 hover:bg-purple-50 transition-colors"
          >
            رجوع
          </button>
        </div>
      </form>
    </ng-container>

    <!-- ===================== تم إرسال الطلب ===================== -->
    <ng-container *ngIf="submitted">
      <div class="flex flex-col items-center text-center py-20">
        <div class="w-20 h-20 rounded-full bg-cyan-50 flex items-center justify-center mb-6">
          <svg class="w-10 h-10 text-cyan-400" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
          </svg>
        </div>
        <h2 class="text-2xl md:text-3xl font-extrabold text-[#3a1560] mb-3">تم إرسال طلب الإستشارة بنجاح</h2>
        <p class="text-slate-500 text-base leading-relaxed mb-10 max-w-md">
          هيتم مراجعة طلبك من {{ doctor.name }} والرد عليك في أقرب وقت ممكن
        </p>
        <button
          (click)="onBack()"
          class="bg-cyan-400 hover:bg-cyan-500 transition-colors text-white font-extrabold text-base py-3.5 px-12 rounded-full shadow-md"
        >
          العودة للرئيسية
        </button>
      </div>
    </ng-container>

  </div>
</div>
