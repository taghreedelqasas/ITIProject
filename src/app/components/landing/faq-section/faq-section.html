<div class="bg-[#F3F4F5A3]">
<section class=" mx-auto text-center   w-[80%]   py-8    px-6">
  <span class="inline-block bg-purple-100 text-purple-700 px-4 py-1.5 rounded-full text-sm mb-4">
    الأسئلة الشائعة
  </span>
  <h2 class="text-3xl font-extrabold text-slate-900 mb-2">كل ما تريد معرفته عن موعد</h2>
  <p class="text-slate-500 mb-10">لم تجد إجابة؟ تواصل معنا على مدار الساعة</p>

  <div class="grid md:grid-cols-2 gap-2 text-right ">
    <div
      *ngFor="let faq of faqs(); let i = index"
      class="bg-white rounded-xl border overflow-hidden transition-colors"
      [class.border-purple-400]="faq.open"
      [class.border-slate-200]="!faq.open"
    >
      <button
        (click)="toggle(i)"
        class="w-full flex items-center gap-3 px-5 py-4 font-semibold text-slate-800 text-[15px]"
      >
        <span
          class="w-7 h-7 shrink-0 rounded-full flex items-center justify-center text-white"
          [class.bg-slate-900]="!faq.open"
          [class.bg-purple-600]="faq.open"
        >
          {{ faq.open ? '−' : '+' }}
        </span>
        <span>{{ faq.question }}</span>
      </button>

      <div
        *ngIf="faq.open && faq.answer"
        class="px-5 pb-5 pr-16 text-sm text-slate-500 leading-relaxed"
      >
        {{ faq.answer }}
      </div>
    </div>
  </div>
</section>

</div>
