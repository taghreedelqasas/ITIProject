<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
  .custom-font-cairo {
    font-family: 'Cairo', sans-serif !important;
  }
</style>

<div dir="rtl" class="min-h-screen bg-[#F4F5F7] text-right custom-font-cairo pb-12">

  <main class="max-w-4xl mx-auto px-4 space-y-6">

    <div class="bg-white p-5 rounded-2xl border border-gray-100 flex justify-between items-center shadow-sm">
      
      <div class="flex items-center gap-4">
        <!-- عنصر رفع الصورة المخفي -->
        <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" class="hidden" />

        <div class="relative group cursor-pointer" (click)="fileInput.click()">
          <div class="w-16 h-16 rounded-2xl border-4 border-[#23E0E0] overflow-hidden bg-gray-100 shadow-sm relative">
            <img [src]="patientServices.userProfile()?.profilePictureUrl || 'assets/images/default-avatar.png'" class="w-full h-full object-cover" alt="profile" />
            
            <!-- طبقة حماية وإظهار عند التحميل -->
            <div *ngIf="isUploadingImage" class="absolute inset-0 bg-black/50 flex items-center justify-center">
              <span class="text-white text-xs animate-spin">⌛</span>
            </div>
          </div>
          
          <!-- زر الأيقونة للكاميرا -->
          <div class="absolute -bottom-1 -left-1 bg-[#53098D] text-white p-1.5 rounded-full text-[12px] border-2 border-white shadow-md hover:scale-110 transition-transform">
            📷
          </div>
        </div>

        <div class="text-right">
          <h2 class="font-bold text-xl text-[#53098D]">{{ patientServices.userProfile()?.fullName }}</h2>
        </div>
      </div>

      <button *ngIf="!isEditing" (click)="toggleEdit()" class="bg-[#23E0E0] text-black px-6 py-2 rounded-full cursor-pointer text-sm font-bold shadow-sm transition hover:opacity-90">
        تعديل البيانات
      </button>

    </div>

    <form class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm space-y-6" #profileForm="ngForm" (ngSubmit)="saveData()" novalidate>
      
      <div class="flex justify-between items-center border-r-4 border-[#23E0E0] pr-3">
        <h3 class="font-bold text-base text-[#53098D]">البيانات الشخصية</h3>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5">

        <div class="flex flex-col gap-1.5 text-right">
          <label class="text-sm text-gray-700 font-bold">الاسم الكامل</label>
          <input type="text" name="fullName" #fullName="ngModel"
                 [(ngModel)]="userData.fullName" [disabled]="!isEditing"
                 required minlength="3"
                 class="w-full border border-gray-300 rounded-xl p-3 bg-white text-sm font-semibold text-gray-800 focus:outline-none focus:border-[#53098D] disabled:bg-gray-50 disabled:text-gray-500"
                 [class.border-red-400]="fullName.invalid && fullName.touched">
        </div>

        <div class="flex flex-col gap-1.5 text-right">
          <label class="text-sm text-gray-700 font-bold">البريد الإلكتروني</label>
          <input type="email" name="email" #email="ngModel"
                 [(ngModel)]="userData.email" [disabled]="!isEditing"
                 required email
                 class="w-full border border-gray-300 rounded-xl p-3 bg-white text-sm font-semibold text-gray-800 focus:outline-none text-left" dir="ltr">
        </div>

        <div class="flex flex-col gap-1.5 text-right">
          <label class="text-sm text-gray-700 font-bold">رقم الهاتف</label>
          <div class="flex border border-gray-300 rounded-xl overflow-hidden bg-white" dir="ltr">
            <input type="text" name="phone" #phone="ngModel"
                   [(ngModel)]="userData.phone" [disabled]="!isEditing"
                   required pattern="^01[0125][0-9]{8}$"
                   class="w-full p-3 bg-transparent text-sm font-semibold text-gray-800 focus:outline-none text-left">
            
          </div>
        </div>

        <div class="flex flex-col gap-1.5 text-right">
          <label class="text-sm text-gray-700 font-bold">تاريخ الميلاد</label>
          <div class="relative flex items-center">
            <input type="date" name="birthDate" [(ngModel)]="userData.birthDate" [disabled]="!isEditing"
                   class="w-full border border-gray-300 rounded-xl p-3 bg-white text-sm font-semibold text-gray-800 focus:outline-none pl-10">
            <span class="absolute left-3 text-gray-400">📅</span>
          </div>
        </div>

      <div class="flex flex-col gap-1.5 md:col-span-2 text-right">
  <label class="text-sm text-gray-700 font-bold">
    الجنس
  </label>

<select
  name="gender"
  [(ngModel)]="userData.gender"
  disabled
  class="w-full border border-gray-300 rounded-xl p-3 bg-white text-sm font-semibold text-gray-800 focus:outline-none appearance-none">

  <option [ngValue]="1">ذكر</option>
  <option [ngValue]="2">أنثى</option>
</select>
</div>

      </div>

      <div *ngIf="isEditing" class="pt-2 text-right">
        <button type="submit" [disabled]="profileForm.invalid"
                class="bg-[#23E0E0] text-black px-8 py-2.5 rounded-full text-sm font-bold shadow-sm cursor-pointer transition hover:opacity-90">
          حفظ التعديلات
        </button>
      </div>
    </form>



  </main>

</div>
