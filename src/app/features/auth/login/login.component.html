<div class="page-wrapper">
  
  

  <!-- Right Panel: Form -->
  <div class="form-panel">
    <div class="form-container">

      <!-- Logo -->
      <div class="logo">
        
      </div>

      <!-- Welcome Message -->
      <div class="welcome-section">
        <h1 class="welcome-title">مرحباً بعودتك !</h1>
        <p class="welcome-subtitle">سجل الدخول للوصول إلى حسابك</p>
      </div>

      

     

      <!-- Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

        <!-- Email -->
        <div class="field-group">
          <label>البريد الإلكتروني<span class="req">*</span></label>
          <input formControlName="email" type="email"
            placeholder="name@example.com"
            [class.invalid]="isInvalid('email')" />
          <span class="error-msg" *ngIf="isInvalid('email')">
            {{ loginForm.get('email')?.errors?.['required'] ? 'البريد الإلكتروني مطلوب' : 'البريد الإلكتروني غير صحيح' }}
          </span>
        </div>

        <!-- Password -->
        <div class="field-group">
          <label>كلمة المرور<span class="req">*</span></label>
          <div class="password-input" [class.invalid]="isInvalid('password')">
            <input formControlName="password"
              [type]="showPassword ? 'text' : 'password'"
              placeholder="••••••••" />
            <button type="button" class="eye-btn" (click)="showPassword = !showPassword">
              <i *ngIf="!showPassword" class="fas fa-eye-slash"></i>
              <i *ngIf="showPassword" class="fas fa-eye"></i>
            </button>
          </div>
          <span class="error-msg" *ngIf="isInvalid('password')">
            كلمة المرور مطلوبة (6 أحرف على الأقل)
          </span>
        </div>

        <!-- Forgot Password -->
        <div class="forgot-password-row">
          <a routerLink="/auth/forgot-password" class="forgot-link">نسيت كلمة المرور؟</a>
        </div>

        <!-- API Error -->
        <div class="api-error" *ngIf="apiError">{{ apiError }}</div>

        <!-- Submit -->
        <button class="submit-btn" type="submit" [disabled]="isLoading">
          <span *ngIf="!isLoading">تسجيل دخول</span>
          <span *ngIf="isLoading" class="spinner"></span>
        </button>

      </form>

      <!-- Register Link -->
      <p class="register-link">
        ليس لديك حساب؟
        <a routerLink="/auth/register">إنشاء حساب جديد</a>
      </p>

    </div>
  </div>

  <!-- Left Panel: Image -->
  <div class="image-panel"></div>

</div>
