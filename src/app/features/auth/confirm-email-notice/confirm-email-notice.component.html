<div class="notice-container">

  

  <!-- Right Panel -->
  <div class="content-panel">

    <div class="logo"></div>

    <h1 class="title">
      التحقق من البريد
    </h1>

    <p class="subtitle">
      لقد أرسلنا رابط تفعيل إلى بريدك الإلكتروني
      <br>
      <strong>{{ email }}</strong>
    </p>

    <div class="illustration"></div>

    <p class="instructions">
      يرجى فتح البريد الإلكتروني والضغط على رابط التحقق
      <br>
      لتفعيل حسابك والبدء في استخدام موعد.
    </p>

   

    <button
      class="home-btn"
      type="button"
      [routerLink]="['/']">
      العودة للرئيسية
    </button>

    <button
      class="back-btn"
      type="button"
      (click)="goBack()">
      ← السابق
    </button>

  </div>
  <!-- Left Image -->
  <div class="image-side"></div>

</div>
