<div class="page-wrapper">

   <!-- Image Panel -->
  <div class="image-panel"></div>
  
  <!-- Form Panel -->
  <div class="form-panel">
    <div class="form-container">

      <!-- Logo -->
      <div class="logo">
        <div class="logo-icon">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <rect x="4" y="4" width="14" height="14" rx="3" stroke="#6C3FC5" stroke-width="2.2"/>
            <rect x="22" y="4" width="14" height="14" rx="3" stroke="#00C2CB" stroke-width="2.2"/>
            <rect x="4" y="22" width="14" height="14" rx="3" stroke="#00C2CB" stroke-width="2.2"/>
            <rect x="22" y="22" width="14" height="14" rx="3" stroke="#6C3FC5" stroke-width="2.2"/>
            <line x1="11" y1="18" x2="11" y2="22" stroke="#6C3FC5" stroke-width="2.2"/>
            <line x1="29" y1="18" x2="29" y2="22" stroke="#00C2CB" stroke-width="2.2"/>
            <line x1="18" y1="11" x2="22" y2="11" stroke="#00C2CB" stroke-width="2.2"/>
            <line x1="18" y1="29" x2="22" y2="29" stroke="#6C3FC5" stroke-width="2.2"/>
          </svg>
        </div>
        <span class="logo-text">Maw<span class="logo-accent">3</span>ed</span>
      </div>

      <!-- Illustration -->
      <div class="illustration">
        <svg width="180" height="140" viewBox="0 0 180 140" fill="none">
          <!-- Envelope body -->
          <rect x="20" y="45" width="140" height="90" rx="8" fill="#EDE9F8" stroke="#6C3FC5" stroke-width="2"/>
          <!-- Envelope flap -->
          <path d="M20 53 L90 95 L160 53" stroke="#6C3FC5" stroke-width="2" fill="none"/>
          <!-- Letter lines -->
          <line x1="55" y1="75" x2="125" y2="75" stroke="#00C2CB" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="55" y1="88" x2="110" y2="88" stroke="#00C2CB" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="55" y1="101" x2="120" y2="101" stroke="#00C2CB" stroke-width="2.5" stroke-linecap="round"/>
          <!-- Check circle -->
          <circle cx="138" cy="42" r="22" fill="#00C2CB"/>
          <path d="M128 42 L135 49 L149 35" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- Dots decoration -->
          <circle cx="25" cy="35" r="4" fill="#EDE9F8"/>
          <circle cx="155" cy="130" r="5" fill="#EDE9F8"/>
          <circle cx="15" cy="110" r="3" fill="#6C3FC5" opacity="0.3"/>
        </svg>
      </div>

      <!-- Title -->
      <h1 class="title">التحقق من البريد</h1>

      <!-- Subtitle -->
      <p class="subtitle">
        لقد أرسلنا رابط تفعيل إلى بريدك الإلكتروني
      </p>
      <p class="email-display">{{ email }}</p>

      <!-- Description -->
      <p class="description">
        يرجى فتح البريد الإلكتروني والضغط على رابط التحقق
        لتفعيل حسابك والبدء في إستخدام موعد.
      </p>

      <!-- Back to Home -->
      <a routerLink="/auth/register" class="home-btn">العودة للرئيسية</a>

      <!-- Back -->
      <button class="back-btn" (click)="router.navigate(['/auth/register'])">
        → السابق
      </button>

    </div>
  </div>

 

</div>
