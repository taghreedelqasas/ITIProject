<div class="page-wrapper">
  
 
  <!-- Right Panel: Form -->
  <div class="form-panel">
    <div class="form-container">

      <!-- Logo -->
      <div class="logo"></div>

      <!-- Header -->
      <div class="header-section">
        <h1 class="page-title">نسيت كلمة المرور</h1>
        <p class="page-subtitle">أدخل بريدك الإلكتروني وسنرسل لك رابط لإعادة تعيين كلمة المرور</p>
      </div>

      <!-- Form -->
      <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" novalidate>

        <!-- Email -->
        <div class="field-group">
          <label>البريد الإلكتروني<span class="req">*</span></label>
          <input formControlName="email" type="email"
            placeholder="name@example.com"
            [class.invalid]="isInvalid('email')" />
          <span class="error-msg" *ngIf="isInvalid('email')">
            {{ forgotPasswordForm.get('email')?.errors?.['required'] ? 'البريد الإلكتروني مطلوب' : 'البريد الإلكتروني غير صحيح' }}
          </span>
        </div>

        <!-- Success Message -->
        <div class="success-msg" *ngIf="successMessage">
          <i class="fas fa-check-circle"></i>
          {{ successMessage }}
        </div>

        <!-- API Error -->
        <div class="api-error" *ngIf="apiError">{{ apiError }}</div>

        <!-- Submit -->
        <button class="submit-btn" type="submit" [disabled]="isLoading">
          <span *ngIf="!isLoading">إرسال</span>
          <span *ngIf="isLoading" class="spinner"></span>
        </button>

      </form>

      <!-- Back to Login -->
      <p class="back-link">
        <a routerLink="/auth/login">العودة إلى تسجيل الدخول</a>
      </p>

    </div>
  </div>
   <!-- Left Panel: Image -->
  <div class="image-panel"></div>


</div>
